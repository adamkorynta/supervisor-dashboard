services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: supervisor_dashboard
      POSTGRES_USER: supervisor
      POSTGRES_PASSWORD: supervisor
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supervisor -d supervisor_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gei-internal/davis-supervisor-dashboard:latest
    environment:
      DATABASE_URL: postgres://supervisor:supervisor@db:5432/supervisor_dashboard
    ports:
      - "3005:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
